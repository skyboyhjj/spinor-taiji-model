<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章标题</title>
    <style>
        /* ========================================
           6月4日微信公众号样式模板 - v2.0.0
           创建日期: 2026-06-07
           ======================================== */
        
        /* ========================================
           模块1：基础变量定义
           ======================================== */
        :root {
            /* 主色调 */
            --primary-color: #8B1E22;
            --secondary-color: #a82830;
            --accent-gold: #c9a227;
            
            /* 背景色 */
            --bg-color: #ffffff;
            --light-bg: #f9f9f9;
            
            /* 文字色 */
            --text-color: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            
            /* 间距 */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            
            /* 字体 */
            --font-size-xs: 13px;
            --font-size-sm: 14px;
            --font-size-md: 15px;
            --font-size-lg: 17px;
            --font-size-xl: 20px;
            --font-size-xxl: 22px;
            
            /* 深色模式 */
            --dark-bg: #1a1410;
            --dark-text: #c8c8c8;
            --dark-accent: #e0a060;
        }

        /* ========================================
           模块2：重置与基础样式
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
        }

        /* ========================================
           模块3：文章容器
           ======================================== */
        .article-container {
            max-width: 677px;
            margin: 0 auto;
            padding: var(--spacing-md);
        }

        /* ========================================
           模块4：标题样式
           ======================================== */
        h1.article-title {
            /* 一级标题样式 */
            font-size: var(--font-size-xxl);
            font-weight: bold;
            color: var(--primary-color);
            text-align: center;
            letter-spacing: 0.1em;
            line-height: 1.2;
            padding: var(--spacing-md) var(--spacing-lg);
            background-image: repeating-linear-gradient(45deg, rgba(139,30,34,0.03), rgba(139,30,34,0.03) 2px, transparent 2px, transparent 8px);
            border-top: 2px solid var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            width: 80%;
            margin: var(--spacing-lg) auto;
        }

        h2.section-title {
            /* 二级标题样式 */
            font-size: var(--font-size-xl);
            font-weight: bold;
            color: var(--primary-color);
            line-height: 1.2;
            letter-spacing: 0.1em;
            padding: 0 0 var(--spacing-sm) var(--spacing-md);
            border-left: 4px solid var(--primary-color);
            border-bottom: 1px dashed rgba(139,30,34,0.4);
            margin: var(--spacing-xl) 0 var(--spacing-md) 0;
        }

        h3.sub-title {
            /* 三级标题样式 */
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--primary-color);
            line-height: 1.6;
            padding: 0 0 var(--spacing-xs) var(--spacing-md);
            border-left: 3px solid var(--primary-color);
            margin: var(--spacing-xl) 0 var(--spacing-md) 0;
        }

        /* ========================================
           模块5：段落与正文样式
           ======================================== */
        p {
            font-size: var(--font-size-md);
            color: var(--text-color);
            line-height: 2;
            margin-top: 0;
            margin-bottom: 19px;
            letter-spacing: 0.5px;
            text-align: left;
        }

        strong {
            font-weight: bold;
            color: var(--primary-color);
        }

        /* ========================================
           模块6：列表样式
           ======================================== */
        .list-container {
            margin: var(--spacing-md) 0;
        }

        .list-item {
            display: flex;
            margin-bottom: var(--spacing-sm);
            align-items: flex-start;
        }

        .list-bullet {
            color: var(--primary-color);
            margin-right: var(--spacing-sm);
            font-weight: bold;
        }

        .list-content {
            font-size: var(--font-size-md);
            color: var(--text-color);
            line-height: 1.8;
            letter-spacing: 0.5px;
        }

        .numbered-list {
            display: flex;
            margin-bottom: var(--spacing-sm);
            align-items: flex-start;
        }

        .number-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            min-width: 22px;
            background: rgba(139,30,34,0.1);
            color: var(--primary-color);
            border-radius: 50%;
            font-size: var(--font-size-xs);
            font-weight: bold;
            margin-right: var(--spacing-sm);
            margin-top: 4px;
        }

        .numbered-content {
            font-size: var(--font-size-md);
            color: var(--text-color);
            line-height: 1.8;
            letter-spacing: 0.5px;
        }

        /* ========================================
           模块7：表格样式
           ======================================== */
        .article-table {
            width: 100%;
            border-collapse: separate;
            margin-top: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            font-size: var(--font-size-md);
            border-spacing: 0;
            border-radius: 0;
            overflow: hidden;
            border: 1px solid rgba(139,30,34,0.3);
        }

        .article-table thead th {
            background: linear-gradient(to bottom, rgba(139,30,34,0.15), rgba(139,30,34,0.05));
            padding: var(--spacing-md);
            border-bottom: 2px solid rgba(139,30,34,0.5);
            text-align: left;
            font-weight: bold;
            color: var(--primary-color);
        }

        .article-table tbody td {
            padding: var(--spacing-md);
            border-bottom: 1px solid rgba(139,30,34,0.1);
            color: var(--text-color);
        }

        .article-table tbody tr:nth-child(even) {
            background: var(--light-bg);
        }

        /* ========================================
           模块8：引用块样式
           ======================================== */
        blockquote {
            margin: var(--spacing-md) 0;
            padding: var(--spacing-md) var(--spacing-lg);
            background: rgba(139,30,34,0.05);
            border-left: 4px solid var(--primary-color);
            font-size: var(--font-size-md);
            color: var(--text-color);
            line-height: 1.8;
        }

        /* ========================================
           模块9：分隔线样式
           ======================================== */
        hr {
            margin-top: var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
            height: 1px;
            background: linear-gradient(to right, rgba(139,30,34,0), rgba(139,30,34,0.5), rgba(139,30,34,0));
            border: none;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        /* ========================================
           模块10：深色模式样式
           ======================================== */
        /* 
           ⚠️ 重要说明：
           深色模式CSS仅用于样式定义，
           不要在HTML中手动添加data-darkmode-*属性。
           深色模式应由微信公众号编辑器自动处理。
        */
        [data-darkmode-bgcolor="#1a1410"] {
            background-color: var(--dark-bg);
            color: var(--dark-text);
        }

        [data-darkmode-bgcolor="#1a1410"] h1,
        [data-darkmode-bgcolor="#1a1410"] h2,
        [data-darkmode-bgcolor="#1a1410"] h3 {
            color: var(--dark-accent);
        }

        [data-darkmode-bgcolor="#1a1410"] strong {
            color: var(--dark-accent);
        }

        [data-darkmode-bgcolor="#1a1410"] .article-table {
            border-color: #3a3020;
        }

        [data-darkmode-bgcolor="#1a1410"] .article-table thead th {
            background: linear-gradient(to bottom, rgba(224,160,96,0.15), rgba(224,160,96,0.05));
            color: var(--dark-accent);
            border-bottom-color: rgba(224,160,96,0.5);
        }

        [data-darkmode-bgcolor="#1a1410"] .article-table tbody td {
            border-bottom-color: #3a3020;
        }

        [data-darkmode-bgcolor="#1a1410"] .article-table tbody tr:nth-child(even) {
            background: #2a2015;
        }

        [data-darkmode-bgcolor="#1a1410"] blockquote {
            background: rgba(224,160,96,0.05);
            border-left-color: var(--dark-accent);
        }

        /* ========================================
           模块11：图片与媒体样式
           ======================================== */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .image-caption {
            font-size: var(--font-size-sm);
            color: var(--text-muted);
            text-align: center;
            margin-top: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }

        /* ========================================
           模块12：交互与底部样式
           ======================================== */
        .interaction-section {
            text-align: center;
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px dashed rgba(139,30,34,0.3);
        }

        .interaction-hint {
            font-size: var(--font-size-xs);
            color: var(--text-muted);
            margin-bottom: var(--spacing-md);
        }

        .interaction-buttons {
            display: flex;
            justify-content: center;
            gap: var(--spacing-md);
            flex-wrap: wrap;
        }

        .interaction-btn {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-sm) var(--spacing-lg);
            border-radius: 20px;
            font-size: var(--font-size-sm);
            text-decoration: none;
            cursor: pointer;
        }

        .btn-like {
            background: #fa2d2d;
            color: white;
        }

        .btn-star {
            background: var(--primary-color);
            color: white;
        }

        .btn-share {
            background: #07c160;
            color: white;
        }

        .footer {
            text-align: center;
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid #eeeeee;
        }

        .footer p {
            font-size: var(--font-size-xs);
            color: var(--text-muted);
            margin-bottom: var(--spacing-xs);
        }

        /* ========================================
           扩展组件：高亮框
           ======================================== */
        .highlight-box {
            background: linear-gradient(135deg, rgba(139,30,34,0.05), rgba(201,162,39,0.05));
            border-radius: 8px;
            padding: var(--spacing-lg);
            margin: var(--spacing-lg) 0;
            border: 1px solid rgba(139,30,34,0.2);
        }

        .highlight-box p {
            font-size: var(--font-size-lg);
            font-weight: 500;
            color: var(--primary-color);
            text-align: center;
            margin: 0;
        }

        /* ========================================
           扩展组件：卡片
           ======================================== */
        .article-card {
            background: var(--light-bg);
            border-radius: 12px;
            padding: var(--spacing-lg);
            margin: var(--spacing-md) 0;
            border-left: 4px solid var(--primary-color);
            transition: transform 0.2s;
        }

        .card-title {
            font-size: var(--font-size-lg);
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: var(--spacing-sm);
        }

        .card-desc {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .article-number {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            font-size: var(--font-size-xs);
            padding: 2px var(--spacing-sm);
            border-radius: 12px;
            margin-bottom: var(--spacing-sm);
        }
    </style>
</head>
<body>
    <!-- 
        ⚠️ 重要：不要在这里添加data-darkmode属性！
        深色模式由微信公众号编辑器自动处理。
    -->
    <section>
        <div class="article-container">
            
            <!-- ========================================
                 文章模板开始
                 ======================================== -->
            
            <!-- 1. 文章主标题 -->
            <h1 class="article-title">🌌 文章主标题</h1>
            
            <!-- 2. 引导段落 -->
            <p>这里是引导内容...</p>
            
            <!-- 3. 分隔线 -->
            <hr>
            
            <!-- 4. 章节内容 -->
            <h2 class="section-title">📖 章节标题</h2>
            <p>章节内容...</p>
            
            <!-- 5. 子章节 -->
            <h3 class="sub-title">子章节标题</h3>
            <p>子章节内容...</p>
            
            <!-- 6. 圆点列表 -->
            <div class="list-container">
                <div class="list-item">
                    <span class="list-bullet">•</span>
                    <span class="list-content">列表项内容1</span>
                </div>
                <div class="list-item">
                    <span class="list-bullet">•</span>
                    <span class="list-content">列表项内容2</span>
                </div>
            </div>
            
            <!-- 7. 编号列表 -->
            <div class="list-container">
                <div class="numbered-list">
                    <span class="number-circle">1</span>
                    <span class="numbered-content">编号列表项1</span>
                </div>
                <div class="numbered-list">
                    <span class="number-circle">2</span>
                    <span class="numbered-content">编号列表项2</span>
                </div>
            </div>
            
            <!-- 8. 引用块 -->
            <blockquote>
                <strong>引用内容</strong>
            </blockquote>
            
            <!-- 9. 高亮框 -->
            <div class="highlight-box">
                <p>重要提示或核心观点</p>
            </div>
            
            <!-- 10. 文章卡片 -->
            <div class="article-card">
                <span class="article-number">📌 推荐</span>
                <h3 class="card-title">卡片标题</h3>
                <p class="card-desc">卡片描述内容...</p>
            </div>
            
            <!-- 11. 表格 -->
            <table class="article-table">
                <thead>
                    <tr>
                        <th>表头1</th>
                        <th>表头2</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>内容1</td>
                        <td>内容2</td>
                    </tr>
                    <tr>
                        <td>内容3</td>
                        <td>内容4</td>
                    </tr>
                </tbody>
            </table>
            
            <!-- 12. 图片 -->
            <img src="images/xxx.jpg" alt="图片描述">
            <p class="image-caption">图片说明</p>
            
            <!-- 13. 分隔线 -->
            <hr>
            
            <!-- 14. 结语 -->
            <h2 class="section-title">✨ 结语</h2>
            <p>结语内容...</p>
            
            <!-- 15. 交互区 -->
            <div class="interaction-section">
                <p class="interaction-hint">如果这篇文章对你有帮助，欢迎转发给需要的朋友</p>
                <div class="interaction-buttons">
                    <a href="javascript:;" class="interaction-btn btn-like" onclick="alert('感谢你的支持！')">
                        <span>👍</span> 点赞
                    </a>
                    <a href="javascript:;" class="interaction-btn btn-star" onclick="alert('感谢你的鼓励！')">
                        <span>⭐</span> 在看
                    </a>
                    <a href="javascript:;" class="interaction-btn btn-share" onclick="alert('分享给更多需要的人！')">
                        <span>↗</span> 分享
                    </a>
                </div>
            </div>
            
            <!-- 16. 页脚 -->
            <div class="footer">
                <p>（本文属于"振动-觉知"系列文章，旨在用现代科学视角解读东方智慧。）</p>
                <p>TS爱心联盟 · 身心探索系列</p>
            </div>
            
            <!-- ========================================
                 文章模板结束
                 ======================================== -->
            
        </div>
    </section>
</body>
</html>
